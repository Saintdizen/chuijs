<!DOCTYPE html>
<html lang="ru">
<head>
    <!-- META -->
    <meta charset="UTF-8">
    <!-- FRAMEWORK -->
    <script src="framework/chUi.js"></script>
    <!-- PAGES -->
    <script src="views/site_main.js"></script>
    <script src="views/components.js"></script>
    <script src="views/structure_app.js"></script>
    <script src="views/test.js"></script>
    <!-- PAGES -->
</head>
<body>
    <script>
        //APP
        let app = new App({
            id: 'app',
            title: 'chUi Framework',
            faviconPath: 'img/favicon.ico',
            charset: 'UTF-8'
        });
        app.setTheme(app.getTheme())
        //Установка шапки
        const header = app.initHeader('100px');
        header.style().backgroundColor('var(--header_background)');
        header.style().blur(10)
        header.style().border('1px solid var(--border_header)')
        header.add(
            new ContentBlock({
                width: '25%',
                flexDirection: ContentBlock.flexDirection.ROW,
                justifyContent: ContentBlock.justifyContent.START,
                alignItems: ContentBlock.alignItems.CENTER,
                items: [
                    new Image({ src: 'img/left_big.png', alt: '', width: '200px', height: 'auto', className: 'img_header' })
                ]
            }),
            new ContentBlock({
                width: '75%',
                flexDirection: ContentBlock.flexDirection.ROW,
                justifyContent: ContentBlock.justifyContent.SPACE_EVENLY,
                alignItems: ContentBlock.alignItems.CENTER,
                items: [
                    new Button('Установка', () => new Route(new Site_main())),
                    new Button('Структура приложения', () => new Route(new StructureApp())),
                    new Button('Компоненты', () => new Route(new Components())),
                    new Button('Тестовая страница', () => new Route(new Test())),
                    new Button("Сменить тему", () => {
                        if (app.getTheme().includes('light')) {
                            app.setTheme('dark')
                        } else {
                            app.setTheme('light')
                        }
                    })
                ]
            })
        );
        // Инициализация приложения
        app.render(new Site_main());
    </script>
</body>
</html>
